# Build, push, sign and attest the web image.
#
# This is the trust spine behind /verify: every push to `dev` produces a
# GHCR image whose provenance can be checked by anyone with one command —
# no need to trust hashden.app's own claim about what it runs.
#
#   commit  ─►  this workflow  ─►  ghcr.io/.../hashden-web@sha256:…
#                 │  cosign keyless signature  → Rekor public log
#                 └─ SLSA build provenance     → GitHub attestation store
#
# The image is NOT yet what Coolify deploys — that cutover is a separate,
# dashboard-side step (see infrastructure/coolify/README.md). Until then this
# job proves the *pipeline* works: build it, then `cosign verify` / `gh
# attestation verify` it locally.
#
# Scoped to `dev` for now. A `prod` job (push to main, environment: prod)
# is the obvious next copy once dev is green.
name: Release web image (signed)

on:
  push:
    branches: [dev]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/release-web.yml"
  workflow_dispatch:

# Lowercased, owner-stable image ref. GHCR rejects uppercase paths, so this
# is hardcoded rather than derived from ${{ github.repository }}.
env:
  IMAGE: ghcr.io/theicaruswings/hashden-web

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    # Use the `dev` GitHub Environment so the NEXT_PUBLIC_* build inputs come
    # from environment-scoped Variables (Settings → Environments → dev). A
    # `prod` environment later gets its own values without touching this file.
    environment: dev
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless OIDC + attestation
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@v4

      - name: Capture build timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `sha-<full40>` is the immutable tag /verify points at; `dev` is a
          # convenience moving tag.
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep the manifest a single clean image so the digest cosign signs
          # and the digest Coolify pulls are the same. We get provenance from
          # actions/attest-build-provenance + cosign instead of the BuildKit
          # attestation manifest (which would turn this into an index).
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HASHDEN_BUILD_SHA=${{ github.sha }}
            HASHDEN_BUILD_REF=${{ github.ref_name }}
            HASHDEN_BUILD_TIME=${{ steps.ts.outputs.value }}
            NEXT_PUBLIC_HASHDEN_API_URL=${{ vars.NEXT_PUBLIC_HASHDEN_API_URL }}
            NEXT_PUBLIC_HASHDEN_STRATUM_URL=${{ vars.NEXT_PUBLIC_HASHDEN_STRATUM_URL }}
            NEXT_PUBLIC_HASHDEN_RELAYS=${{ vars.NEXT_PUBLIC_HASHDEN_RELAYS }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_DONATIONS_ENABLED=${{ vars.NEXT_PUBLIC_DONATIONS_ENABLED }}
            NEXT_PUBLIC_ZAP_NPUB=${{ vars.NEXT_PUBLIC_ZAP_NPUB }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "### Signed web image"
            echo ""
            echo "- **commit:** \`${SHA}\`"
            echo "- **image:** \`${IMAGE}@${DIGEST}\`"
            echo "- **tag:** \`${IMAGE}:sha-${SHA}\`"
            echo ""
            echo "Verify locally:"
            echo '```sh'
            echo "cosign verify ${IMAGE}@${DIGEST} \\"
            echo "  --certificate-identity-regexp '^https://github.com/TheIcarusWings/hashden/.github/workflows/release-web.yml@refs/heads/dev' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Roll dev forward automatically: pin the freshly-signed digest into the dev
  # compose and push. `infrastructure/coolify/docker-compose.dev.yml` is in the
  # dev resource's Coolify watch_paths, so this push auto-deploys dev — which
  # pulls the new digest. The commit touches only that file (outside this
  # workflow's path filter) so it does NOT re-trigger this workflow, and
  # `[skip ci]` skips the lint/build CI run; Coolify's git integration still
  # receives the push and deploys.
  bump-dev-digest:
    needs: build-sign-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Coolify API token (masked). The deploy is triggered explicitly over
      # HTTPS — this setup doesn't auto-deploy dev on push. If the secret is
      # absent the bump still commits; only the auto-redeploy is skipped.
      CTOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Pin new digest into dev compose
        id: pin
        env:
          DIGEST: ${{ needs.build-sign-attest.outputs.digest }}
        run: |
          set -euo pipefail
          file=infrastructure/coolify/docker-compose.dev.yml
          hex="${DIGEST#sha256:}"
          sed -i -E "s#(ghcr\.io/theicaruswings/hashden-web@sha256:)[a-f0-9]{64}#\1${hex}#" "$file"
          if git diff --quiet -- "$file"; then
            echo "Digest unchanged (${DIGEST}); nothing to bump."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "chore(infra): roll dev web image to ${DIGEST} [skip ci]"
          # Rebase on any concurrent dev changes before pushing.
          git pull --rebase --autostash origin dev
          git push origin HEAD:dev
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "Bumped dev compose to ${DIGEST}."

      - name: Trigger Coolify dev deploy
        if: steps.pin.outputs.bumped == 'true' && env.CTOKEN != ''
        run: |
          set -euo pipefail
          # Dev resource uuid (hashden:dev). Coolify pulls the newly-pinned
          # digest from the dev compose. Base host + uuid are not secret.
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CTOKEN}" \
            "https://coolify.nostreon.com/api/v1/deploy?uuid=bfezxkdfdjbomafdauywngxy&force=false"
          echo
          echo "Coolify dev deploy triggered."
